<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Vault // God Roll Inspector</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-bg: #0f131a;
            --inner-bg: #151b24;
            --text-main: #f5f6f7;
            --text-dim: #7d8c9f;
            --gold-glow: #ffb700;
            --pve-blue: #00ebff;
            --pvp-red: #ff3333;
            --border-color: #1e2633;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.08);
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1300px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 30px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .panel-title {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Filter Styles */
        .filter-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        select {
            width: 100%;
            padding: 14px;
            background-color: var(--inner-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            border-radius: 4px;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s ease;
        }

        select:focus {
            border-color: var(--text-dim);
        }

        select:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Perk Detail Grid Display */
        .perk-section {
            margin-top: 35px;
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .weapon-identity {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-left: 4px solid var(--gold-glow);
            padding-left: 14px;
        }

        .weapon-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
        }

        .archetype-tag {
            font-size: 0.75rem;
            background-color: var(--inner-bg);
            padding: 4px 10px;
            border-radius: 12px;
            color: var(--text-dim);
            border: 1px solid var(--border-color);
        }

        .perk-columns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .perk-card {
            background: var(--inner-bg);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .perk-node {
            padding: 10px 12px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid transparent;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* God Roll Glowing States */
        .god-pve {
            border-color: var(--pve-blue);
            box-shadow: inset 0 0 10px rgba(0, 235, 255, 0.15), 0 0 8px rgba(0, 235, 255, 0.1);
        }
        .badge-pve {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--pve-blue);
            letter-spacing: 0.5px;
        }

        .god-pvp {
            border-color: var(--pvp-red);
            box-shadow: inset 0 0 10px rgba(255, 51, 51, 0.15), 0 0 8px rgba(255, 51, 51, 0.1);
        }
        .badge-pvp {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--pvp-red);
            letter-spacing: 0.5px;
        }

        /* Image Drag & Drop System Layout */
        .upload-container {
            display: flex;
            flex-direction: column;
            height: calc(100% - 60px);
        }

        .upload-zone {
            flex-grow: 1;
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
            min-height: 220px;
        }

        .upload-zone:hover, .upload-zone.dragover {
            background: rgba(255, 255, 255, 0.02);
            border-color: var(--text-dim);
        }

        .upload-icon {
            font-size: 2rem;
            margin-bottom: 12px;
            color: var(--text-dim);
        }

        #image-preview {
            max-width: 100%;
            max-height: 450px;
            object-fit: contain;
            margin-top: 25px;
            border-radius: 4px;
            border: 1px solid var(--border-color);
            display: none;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            animation: fadeIn 0.4s ease-in-out;
        }

        input[type="file"] {
            display: none;
        }
    </style>
</head>
