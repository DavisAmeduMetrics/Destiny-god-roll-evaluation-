<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Vault // Shared Dropzone</title>
    <style>
        :root {
            --bg-dark: #07090e;
            --panel-bg: #0f131a;
            --inner-bg: #151b24;
            --text-main: #f5f6f7;
            --text-dim: #7d8c9f;
            --gold-glow: #ffb700;
            --pve-blue: #00ebff;
            --border-color: #1e2633;
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-stack);
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 24px;
            box-sizing: border-box;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 35px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 24px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin: 0;
            color: #ffffff;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.6);
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--text-dim);
            margin-bottom: 8px;
            letter-spacing: 1px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px;
            background-color: var(--inner-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            font-size: 1rem;
            border-radius: 4px;
            outline: none;
            box-sizing: border-box;
        }

        .upload-zone {
            border: 2px dashed var(--border-color);
            border-radius: 6px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            background-color: rgba(0, 0, 0, 0.1);
            transition: all 0.2s ease;
        }

        .upload-zone:hover {
            border-color: var(--text-main);
            background: rgba(255, 255, 255, 0.02);
        }

        .upload-icon { font-size: 2.5rem; color: var(--text-dim); margin-bottom: 10px; }

        .action-btn {
            background-color: var(--inner-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 15px 25px;
            font-size: 1rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s ease;
        }

        .action-btn:hover:not(:disabled) {
            border-color: var(--gold-glow);
            box-shadow: 0 0 10px rgba(255, 183, 0, 0.2);
        }

        .action-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* Dynamic Copyable Output Link Box */
        .share-box {
            background: var(--inner-bg);
            border: 1px solid var(--pve-blue);
            padding: 15px;
            border-radius: 4px;
            margin-top: 15px;
            display: none;
            font-size: 0.95rem;
            word-break: break-all;
            cursor: pointer;
            text-align: center;
        }

        /* Responsive Vault Multi-Grid View */
        .gallery-header {
            font-size: 1.3rem;
            font-weight: bold;
            border-left: 4px solid var(--gold-glow);
            padding-left: 12px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .gallery-card {
            background: var(--inner-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .gallery-card img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: contain;
            background: #020305;
            display: block;
        }

        input[type="file"] { display: none; }
        .status-msg { font-size: 0.85rem; color: var(--text-dim); margin-top: 8px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <h1>Tower Vault // Shared Dropzone</h1>
        <div class="subtitle">Instant Multi-Image Vault Showcase Showcase</div>
    </header>

    <div class="container">
        <div class="panel">
            <div class="input-group">
                <label for="username-input">Guardian Identifier (Your Name)</label>
                <input type="text" id="username-input" placeholder="Type name here...">
            </div>

            <div class="input-group">
                <label>Roll Documentation Screenshots</label>
                <label for="file-input">
                    <div class="upload-zone">
                        <div class="upload-icon">🎴</div>
                        <p style="margin: 0 0 6px 0; font-weight: 600; color: #fff;">Select Gear Screenshots</p>
                        <p style="color: var(--text-dim); margin: 0; font-size: 0.85rem;">Tap to select multiple pictures all at once</p>
                    </div>
                </label>
                <input type="file" id="file-input" accept="image/*" multiple>
                <div class="status-msg" id="file-status">No screenshots staged for transfer.</div>
            </div>

            <button class="action-btn" id="generate-btn" disabled>Generate Share Link</button>
            <div class="share-box" id="share-link-box"></div>
        </div>

        <div class="panel" id="gallery-panel" style="display: none;">
            <div class="gallery-header" id="gallery-title">Vault Exhibition</div>
            <div class="gallery-grid" id="gallery-target"></div>
        </div>
    </div>

    <script>
        // Free, anonymous public web upload key configuration setting parameter endpoint targets
        const clientToken = "3a92b2fc636ea9242d5f0e9b97b0a70f";
        
        let fileStagingArea = [];
        const usernameInput = document.getElementById('username-input');
        const fileInput = document.getElementById('file-input');
        const fileStatus = document.getElementById('file-status');
        const generateBtn = document.getElementById('generate-btn');
        const shareBox = document.getElementById('share-link-box');
        
        const galleryPanel = document.getElementById('gallery-panel');
        const galleryTitle = document.getElementById('gallery-title');
        const galleryTarget = document.getElementById('gallery-target');

        // Check if an existing configuration link data pack exists right away upon opening page link
        window.addEventListener('DOMContentLoaded', () => {
            const URLParameters = new URLSearchParams(window.location.search);
            const userString = URLParameters.get('user');
            const dataPackString = URLParameters.get('vault');

            if (userString && dataPackString) {
                const imageList = JSON.parse(decodeURIComponent(dataPackString));
                galleryTitle.textContent = `${userString}'s God Rolls`;
                galleryTarget.innerHTML = '';
                
                imageList.forEach(url => {
                    const card = document.createElement('div');
                    card.className = 'gallery-card';
                    card.innerHTML = `<img src="${url}" alt="Vault Image Specimen">`;
                    galleryTarget.appendChild(card);
                });
                galleryPanel.style.display = 'block';
            }
        });

        // Track and process multiple files loaded on input change channels
        fileInput.addEventListener('change', function() {
            fileStagingArea = Array.from(this.files);
            if (fileStagingArea.length > 0) {
                fileStatus.textContent = `✓ ${fileStagingArea.length} Screenshots Staged & Ready.`;
            } else {
                fileStatus.textContent = "No screenshots staged for transfer.";
            }
            toggleActivation();
        });

        usernameInput.addEventListener('input', toggleActivation);

        function toggleActivation() {
            if (usernameInput.value.trim() !== "" && fileStagingArea.length > 0) {
                generateBtn.disabled = false;
            } else {
                generateBtn.disabled = true;
            }
        }

        // Loop, batch process, and upload files to the cloud
        generateBtn.addEventListener('click', async () => {
            generateBtn.disabled = true;
            generateBtn.textContent = "Uploading to Vault Network...";
            
            const uploadedUrls = [];

            for (let i = 0; i < fileStagingArea.length; i++) {
                const formData = new FormData();
                formData.append('image', fileStagingArea[i]);

                try {
                    const response = await fetch(`https://api.imgbb.com/1/upload?key=${clientToken}`, {
                        method: 'POST',
                        body: formData
                    });
                    const parsedData = await response.json();
                    if (parsedData.success) {
                        uploadedUrls.push(parsedData.data.url);
                    }
                } catch (error) {
                    console.error("Transmission error intercepted at cloud interface node: ", error);
                }
            }

            if (uploadedUrls.length > 0) {
                const encodedDataPack = encodeURIComponent(JSON.stringify(uploadedUrls));
                const encodedUser = encodeURIComponent(usernameInput.value.trim());
                
                // Form perfect absolute link paths
                const masterShareLink = `${window.location.origin}${window.location.pathname}?user=${encodedUser}&vault=${encodedDataPack}`;
                
                shareBox.innerHTML = `<strong>LINK GENERATED! Tap box to copy:</strong><br><br>${masterShareLink}`;
                shareBox.style.display = 'block';
                
                shareBox.onclick = () => {
                    navigator.clipboard.writeText(masterShareLink);
                    alert("Vault link copied to device clipboard!");
                };
            } else {
                alert("Upload failed. Verify internet connection configurations and retry drop.");
            }

            generateBtn.textContent = "Generate Share Link";
            toggleActivation();
        });
    </script>
</body>
</html>
